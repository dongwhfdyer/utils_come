# LLM Model Configuration
# All models use OpenAI-compatible API

models:
  # DashScope (Alibaba Cloud) Models
  qwen3-32b-dashscope:
    provider: "dashscope"
    api_base: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    api_key_env: "DASHSCOPE_API_KEY"
    model_name: "qwen-plus"
    description: "Qwen3-32B via DashScope API"
    # Output configuration
    output_config:
      max_tokens: 4096
      temperature: 0.7
      top_p: null  # DashScope may not support all parameters
      top_k: null
      repetition_penalty: null
      seed: null

  qwen-turbo-dashscope:
    provider: "dashscope"
    api_base: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    api_key_env: "DASHSCOPE_API_KEY"
    model_name: "qwen-turbo"
    description: "Qwen Turbo (faster, smaller) via DashScope"
    output_config:
      max_tokens: 4096
      temperature: 0.7
      top_p: null
      top_k: null
      repetition_penalty: null
      seed: null

  # Local SGLang Models
  qwen3-32b-local-sglang:
    provider: "sglang"
    api_base: "http://localhost:8000/v1"
    api_key_env: "SGLANG_API_KEY"  # Can be dummy for local
    model_name: "Qwen3-32B"
    description: "Qwen3-32B running locally via SGLang"
    # Output configuration (as per user's example)
    output_config:
      max_tokens: 2048
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      repetition_penalty: 1.1
      seed: 2025
      # SGLang-specific parameters
      extra_body:
        chat_template_kwargs:
          enable_thinking: false

  qwen2-7b-local-sglang:
    provider: "sglang"
    api_base: "http://localhost:8000/v1"
    api_key_env: "SGLANG_API_KEY"
    model_name: "Qwen2-7B"
    description: "Qwen2-7B running locally via SGLang"
    output_config:
      max_tokens: 2048
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      repetition_penalty: 1.1
      seed: 2025
      extra_body:
        chat_template_kwargs:
          enable_thinking: false

  # Doubao (Bytedance) Models
  doubao-pro-32k:
    provider: "doubao"
    api_base: "https://doubao.zwchat.cn/v1"
    api_key_env: "DOUABAO_API_KEY"
    model_name: "gpt-4o"
    description: "Doubao Pro 32K model"
    output_config:
      max_tokens: 1024
      temperature: 0.7
      top_p: null
      top_k: null
      repetition_penalty: null
      seed: null

  # OpenAI Models (for reference)
  gpt-4o-openai:
    provider: "openai"
    api_base: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
    model_name: "gpt-4o"
    description: "OpenAI GPT-4o"
    output_config:
      max_tokens: 4096
      temperature: 0.7
      top_p: 1.0
      top_k: null  # OpenAI doesn't support top_k
      repetition_penalty: null  # Use frequency_penalty instead
      seed: null

  gpt-4-turbo-openai:
    provider: "openai"
    api_base: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
    model_name: "gpt-4-turbo"
    description: "OpenAI GPT-4 Turbo"
    output_config:
      max_tokens: 4096
      temperature: 0.7
      top_p: 1.0
      top_k: null
      repetition_penalty: null
      seed: null

  gpt-3.5-turbo-openai:
    provider: "openai"
    api_base: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
    model_name: "gpt-3.5-turbo"
    description: "OpenAI GPT-3.5 Turbo"
    output_config:
      max_tokens: 4096
      temperature: 0.7
      top_p: 1.0
      top_k: null
      repetition_penalty: null
      seed: null

# Default model to use if not specified
default_model: "qwen3-32b-dashscope"

# Timeout settings (in seconds)
timeout:
  connect: 10
  read: 60
  write: 10
